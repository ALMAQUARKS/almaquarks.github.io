site_name: QUARKS Website

theme:
  name: material
  features:
    - navigation.tabs  # 顶部横向标签
    - navigation.tabs.sticky  # 让tabs在滚动时保持可见

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Targets: targets.md
  - Continuum: continuum.md
  - Image: image.md
  - Data Policy: datapolicy.md
  - Publications: publications.md
  - Contact us: contact.md
